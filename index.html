<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de MDC - Algoritmo de Euclides</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Calculadora de MDC</h1>
            <p class="subtitle">Máximo Divisor Comum - Algoritmo de Euclides</p>
            
            <div class="input-group">
                <label for="numero1">Primeiro Número:</label>
                <input type="number" id="numero1" placeholder="Digite um número" min="0">
            </div>
            
            <div class="input-group">
                <label for="numero2">Segundo Número:</label>
                <input type="number" id="numero2" placeholder="Digite outro número" min="0">
            </div>
            
            <button id="botaoCalcular" class="btn">Calcular MDC</button>
            
            <div id="resultado" class="resultado"></div>
            
            <div class="info">
                <p><strong>ℹ️ Como funciona:</strong></p>
                <p>O Algoritmo de Euclides calcula o MDC através da regra:<br>
                <code>mdc(a, b) = mdc(b, a % b)</code><br>
                Até que b = 0, então <code>mdc(a, 0) = a</code></p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
